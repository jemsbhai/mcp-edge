name: Wokwi simulation

on:
  push:
    branches: [main]
    paths:
      - "examples/firmware/esp32_micropython/**"
      - ".github/workflows/wokwi.yml"
  pull_request:
    paths:
      - "examples/firmware/esp32_micropython/**"
      - ".github/workflows/wokwi.yml"
  workflow_dispatch:

# Simulated boot smoke tests across the ESP32 family. Each matrix leg builds a MicroPython
# image for one chip with this project's .py files baked into its littlefs filesystem, boots
# it on the matching Wokwi-simulated board, and checks that the entry point runs and prints
# its ready marker. This proves the firmware runs under real MicroPython on each chip --
# catching MicroPython- and chip-incompatible code the hermetic CPython tests cannot.
#
# Chips: ESP32 (base), ESP32-S3, ESP32-C3, ESP32-C6. Entry points:
#   serial: boots main.py (UART transport). Does not exercise the protocol round-trip --
#           Wokwi checks text on UART0, while the frames are binary on UART1. ESP32 only:
#           its UART1 pins (GPIO16/17) are flash pins on the C3, so it is not portable.
#   wifi:   boots main_wifi.py, which connects to Wokwi's simulated "Wokwi-GUEST" network
#           and starts the TCP server. The marker prints only after Wi-Fi connects, so this
#           covers the boot + connect path. It does not exercise the TCP round-trip: Wokwi's
#           default Public Gateway is outbound-only, so the runner cannot reach the device's
#           server (incoming connections need the paid Private Gateway). Has no board-specific
#           GPIO, so it is the portable entry point run on every variant.
#
# Every leg needs the WOKWI_CLI_TOKEN secret and skips cleanly (passing) without it, so they
# never block the core CI workflow.

env:
  WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
  # Stock MicroPython release shared by every ESP32 variant below. Each leg downloads
  # <chip>-<MP_RELEASE>. If a download 404s, check https://micropython.org/download for
  # the current stable filename.
  MP_RELEASE: 20260406-v1.28.0.bin
  EXAMPLE_DIR: examples/firmware/esp32_micropython

jobs:
  boot-smoke-test:
    name: boot-smoke-test (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each leg boots one entry point on one simulated ESP32 variant. The base ESP32
        # runs both transports; the S3/C3/C6 variants run the Wi-Fi entry point, which
        # has no board-specific GPIO -- the serial main.py pins UART1 to GPIO16/17, which
        # are flash pins on the C3, so it is not portable across the family. All variants
        # share the identical 4 MB image recipe (same partition layout).
        include:
          - variant: esp32-serial
            chip: ESP32_GENERIC
            board: board-esp32-devkit-c-v4
            main: main.py
          - variant: esp32-wifi
            chip: ESP32_GENERIC
            board: board-esp32-devkit-c-v4
            main: main_wifi.py
          - variant: esp32s3-wifi
            chip: ESP32_GENERIC_S3
            board: board-esp32-s3-devkitc-1
            main: main_wifi.py
          - variant: esp32c3-wifi
            chip: ESP32_GENERIC_C3
            board: board-esp32-c3-devkitm-1
            main: main_wifi.py
          - variant: esp32c6-wifi
            chip: ESP32_GENERIC_C6
            board: board-esp32-c6-devkitc-1
            main: main_wifi.py
    steps:
      - name: Check for Wokwi token
        id: guard
        run: |
          if [ -z "$WOKWI_CLI_TOKEN" ]; then
            echo "WOKWI_CLI_TOKEN not set (fork or PR without the secret) -- skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install firmware image tool
        if: steps.guard.outputs.run == 'true'
        run: pip install "mp-image-tool-esp32[littlefs]"

      - name: Build MicroPython image with the device files baked in
        if: steps.guard.outputs.run == 'true'
        working-directory: ${{ env.EXAMPLE_DIR }}
        env:
          BOARD: ${{ matrix.board }}
        run: |
          set -euo pipefail
          bin="${{ matrix.chip }}-${MP_RELEASE}"
          # 1. Download this chip's stock MicroPython firmware.
          url="https://micropython.org/resources/firmware/${bin}"
          echo "Downloading ${url}"
          curl -fSL "${url}" -o "${bin}"
          # 2. Pad it to the full 4 MB so the vfs flash region physically exists (every
          #    ESP32 variant here ships a 4 MB image with the same partition layout).
          python -c "open('firmware-4m.bin','wb').write(open('${bin}','rb').read().ljust(0x400000, bytes([255])))"
          # 3. Select this leg's entry point as main.py (MicroPython auto-runs main.py).
          if [ "${{ matrix.main }}" != "main.py" ]; then
            cp "${{ matrix.main }}" main.py
          fi
          # 4. Add a vfs partition, format it littlefs2, and inject the device files.
          #    Recent MicroPython ships no vfs entry (it creates one at runtime), so a
          #    prebuilt image needs the partition added before files can be baked in.
          mp-image-tool-esp32 firmware-4m.bin --add vfs=fat:2M:2M --fs mkfs vfs --fs put main.py mcplite_device.py / -o firmware-fs.bin
          # 5. Log the filesystem contents as a sanity check.
          mp-image-tool-esp32 firmware-fs.bin --fs ls /
          # 6. Point the Wokwi diagram at this leg's board (overwrites the committed
          #    ESP32 diagram on the runner only).
          cat > diagram.json <<EOF
          {"version":1,"author":"MCP-Edge","editor":"wokwi","parts":[{"type":"${BOARD}","id":"esp","top":0,"left":0,"attrs":{}}],"connections":[["esp:TX","\$serialMonitor:RX","",[]],["esp:RX","\$serialMonitor:TX","",[]]],"dependencies":{}}
          EOF

      - name: Boot smoke test on simulated ESP32
        if: steps.guard.outputs.run == 'true'
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: ${{ env.EXAMPLE_DIR }}
          timeout: 90000
          expect_text: "mcp-edge device ready"
          fail_text: "Traceback"
