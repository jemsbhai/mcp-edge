name: Wokwi simulation

on:
  push:
    branches: [main]
    paths:
      - "examples/firmware/esp32_micropython/**"
      - ".github/workflows/wokwi.yml"
  pull_request:
    paths:
      - "examples/firmware/esp32_micropython/**"
      - ".github/workflows/wokwi.yml"
  workflow_dispatch:

# Simulated boot smoke tests. Each matrix leg builds a MicroPython ESP32 image with this
# project's .py files baked into its littlefs filesystem, boots it on a Wokwi-simulated
# ESP32, and checks that the entry point runs and prints its ready marker. This proves the
# firmware runs under real MicroPython -- catching MicroPython-incompatible code the
# hermetic CPython tests cannot.
#
#   serial: boots main.py (UART transport). Does not exercise the protocol round-trip --
#           Wokwi checks text on UART0, while the frames are binary on UART1.
#   wifi:   boots main_wifi.py, which connects to Wokwi's simulated "Wokwi-GUEST" network
#           and starts the TCP server. The marker prints only after Wi-Fi connects, so this
#           covers the boot + connect path. It does not exercise the TCP round-trip: Wokwi's
#           default Public Gateway is outbound-only, so the runner cannot reach the device's
#           server (incoming connections need the paid Private Gateway).
#
# Both legs need the WOKWI_CLI_TOKEN secret and skip cleanly (passing) without it, so they
# never block the core CI workflow.

env:
  WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
  # Stock MicroPython ESP32 image. If the download 404s, check
  # https://micropython.org/download/ESP32_GENERIC for the current stable filename.
  MICROPYTHON_BIN: ESP32_GENERIC-20260406-v1.28.0.bin
  EXAMPLE_DIR: examples/firmware/esp32_micropython

jobs:
  boot-smoke-test:
    name: boot-smoke-test (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: serial
            main: main.py
          - variant: wifi
            main: main_wifi.py
    steps:
      - name: Check for Wokwi token
        id: guard
        run: |
          if [ -z "$WOKWI_CLI_TOKEN" ]; then
            echo "WOKWI_CLI_TOKEN not set (fork or PR without the secret) -- skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install firmware image tool
        if: steps.guard.outputs.run == 'true'
        run: pip install "mp-image-tool-esp32[littlefs]"

      - name: Build MicroPython image with the device files baked in
        if: steps.guard.outputs.run == 'true'
        working-directory: ${{ env.EXAMPLE_DIR }}
        run: |
          set -euo pipefail
          # 1. Download the stock MicroPython firmware.
          url="https://micropython.org/resources/firmware/${MICROPYTHON_BIN}"
          echo "Downloading ${url}"
          curl -fSL "${url}" -o "${MICROPYTHON_BIN}"
          # 2. Pad it to the full 4 MB so the vfs flash region physically exists.
          python -c "open('firmware-4m.bin','wb').write(open('${MICROPYTHON_BIN}','rb').read().ljust(0x400000, bytes([255])))"
          # 3. Select this leg's entry point as main.py (MicroPython auto-runs main.py).
          if [ "${{ matrix.main }}" != "main.py" ]; then
            cp "${{ matrix.main }}" main.py
          fi
          # 4. Add a vfs partition, format it littlefs2, and inject the device files.
          #    Recent MicroPython ships no vfs entry (it creates one at runtime), so a
          #    prebuilt image needs the partition added before files can be baked in.
          mp-image-tool-esp32 firmware-4m.bin --add vfs=fat:2M:2M --fs mkfs vfs --fs put main.py mcplite_device.py / -o firmware-fs.bin
          # 5. Log the filesystem contents as a sanity check.
          mp-image-tool-esp32 firmware-fs.bin --fs ls /

      - name: Boot smoke test on simulated ESP32
        if: steps.guard.outputs.run == 'true'
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: ${{ env.EXAMPLE_DIR }}
          timeout: 60000
          expect_text: "mcp-edge device ready"
          fail_text: "Traceback"
