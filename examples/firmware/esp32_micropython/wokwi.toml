# Wokwi simulation config for the MCP-Edge ESP32 MicroPython device.
#
# "firmware" is a MicroPython image with this project's .py files baked into its
# littlefs filesystem, so the board boots straight into main.py instead of a bare REPL.
# The image is built (not committed) by padding the stock MicroPython firmware to 4 MB,
# adding a vfs partition, and injecting main.py + mcplite_device.py with
# mp-image-tool-esp32 -- see .github/workflows/wokwi.yml. Build it the same way locally
# to run `wokwi-cli .` against this directory.
[wokwi]
version = 1
firmware = 'firmware-fs.bin'
